<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>최근 검사 결과</title>
  <style>
    :root { color-scheme: light; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; color: #1f2937; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    .url { word-break: break-all; color: #4b5563; margin: 4px 0 20px; font-size: 13px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .grid { display: grid; grid-template-columns: 180px 1fr; gap: 20px; align-items: center; }
    .gauge {
      width: 160px; height: 160px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      background: conic-gradient(var(--gc) calc(var(--gp) * 1%), #e5e7eb 0);
    }
    .gauge::after {
      content: "";
      position: absolute; inset: 12px;
      border-radius: 50%;
      background: #fff;
    }
    .gauge .num { position: relative; z-index: 1; font-size: 36px; font-weight: 700; color: var(--gc); }
    .gauge .denom { position: relative; z-index: 1; font-size: 14px; color: #6b7280; margin-left: 2px; align-self: flex-end; padding-bottom: 8px; }
    .signals { display: grid; gap: 8px; }
    .sig {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; border-radius: 8px; background: #f9fafb;
      border: 1px solid #e5e7eb; font-size: 14px;
    }
    .sig .k { color: #6b7280; }
    .sig .v { font-weight: 600; }
    .sig .v.bad { color: #b91c1c; }
    .sig .v.ok  { color: #1f883d; }
    .reason {
      margin-top: 20px; padding: 16px; border-radius: 8px;
      background: #fafafa; border: 1px solid #e5e7eb;
      white-space: pre-wrap; line-height: 1.6; font-size: 14px;
    }
    .actions { margin-top: 20px; display: flex; gap: 10px; }
    button {
      padding: 9px 16px; border-radius: 6px; border: 1px solid #d1d5db;
      background: #fff; cursor: pointer; font-size: 13px; font-family: inherit;
    }
    button:hover { background: #f3f4f6; }
    button.warn { color: #b91c1c; border-color: #fecaca; }
    pre { white-space: pre-wrap; background: #f4f4f5; padding: 10px; border-radius: 6px; font-size: 11px; color: #6b7280; margin-top: 20px; }
    .ts { color: #9ca3af; font-size: 12px; margin-top: 12px; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .badge.danger { background: #fee2e2; color: #7f1d1d; }
    .badge.warn   { background: #fef3c7; color: #78350f; }
    .badge.ok     { background: #d1fae5; color: #064e3b; }
  </style>
</head>
<body>
  <div id="root">불러오는 중…</div>
  <script src="verdict.js"></script>
</body>
</html>
