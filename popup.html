<!doctype html>
<html data-i18n-doctitle="popup.title">
<head>
  <meta charset="utf-8">
  <title>Phishing Scanner</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 320px; margin: 0; padding: 12px; }
    h1 { font-size: 13px; margin: 0 0 8px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .lang { font-size: 11px; color: #6b7280; }
    .lang a { color: #1f6feb; text-decoration: none; cursor: pointer; }
    .lang a.active { color: #111827; font-weight: 600; cursor: default; }
    .status { font-size: 12px; padding: 6px 8px; border-radius: 6px; margin-bottom: 8px; }
    .status.ok { background: #d1fae5; color: #064e3b; }
    .status.dl { background: #fef3c7; color: #78350f; }
    .status.no { background: #fee2e2; color: #7f1d1d; }
    .url { font-size: 11px; word-break: break-all; color: #555; margin: 6px 0; }
    button { width: 100%; padding: 8px; border: 0; border-radius: 6px; background: #1f6feb; color: #fff; font-size: 13px; cursor: pointer; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    button.ghost { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; font-size: 11px; padding: 6px; margin-top: 8px; }
    button.ghost:disabled { background: #f9fafb; color: #9ca3af; }
    .diag-link { display: block; margin: -4px 0 8px; font-size: 11px; color: #1f6feb; text-decoration: underline; cursor: pointer; }
    .verdict { margin-top: 10px; padding: 8px; border-radius: 6px; font-size: 12px; }
    .v-ok     { background: #d1fae5; color: #064e3b; }
    .v-warn   { background: #fef3c7; color: #78350f; }
    .v-danger { background: #fee2e2; color: #7f1d1d; }
    .reason { white-space: pre-wrap; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>
    <span data-i18n="popup.heading">Phishing Link Scanner</span>
    <span class="lang">
      <a id="lang-en" class="active">EN</a>
      <span> | </span>
      <a id="lang-ko">한국어</a>
    </span>
  </h1>
  <div id="status" class="status" data-i18n="popup.checking">Checking status…</div>
  <a id="diagLink" class="diag-link" hidden data-i18n="popup.diagWhy">Why is the model unavailable? (run diagnostic)</a>
  <div class="url" id="url"></div>
  <button id="scan" disabled data-i18n="popup.btnScan">Scan current page</button>
  <div id="result"></div>
  <button id="resetThis" class="ghost" data-i18n="popup.btnResetThis" data-i18n-title="popup.btnResetThisTip">Reset history for this page</button>
  <button id="reset" class="ghost" data-i18n="popup.btnResetAll" data-i18n-title="popup.btnResetAllTip">Reset all scan history</button>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
