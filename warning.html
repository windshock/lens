<!doctype html>
<html data-i18n-doctitle="warning.title">
<head>
  <meta charset="utf-8">
  <title>Suspected phishing page</title>
  <link rel="stylesheet" href="warning.css">
</head>
<body>
  <main class="container">
    <div class="shield" aria-hidden="true">
      <svg width="96" height="96" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
        <path d="M12 2 L4 5 v6 c0 5 3.5 9 8 11 4.5-2 8-6 8-11 V5 z" stroke-linejoin="round"/>
        <line x1="9"  y1="9"  x2="15" y2="15" stroke-linecap="round"/>
        <line x1="15" y1="9"  x2="9"  y2="15" stroke-linecap="round"/>
      </svg>
    </div>

    <h1 data-i18n="warning.heading">This page is suspected of phishing</h1>
    <p class="subtitle" data-i18n="warning.subtitle">Account theft and financial harm are possible. Avoid this page if possible.</p>

    <section class="card">
      <div class="row"><span class="label" data-i18n="warning.label.url">URL</span><code id="url" class="value mono"></code></div>
      <div class="row"><span class="label" data-i18n="warning.label.score">Risk</span><span id="score" class="value score"></span></div>
      <div class="row"><span class="label" data-i18n="warning.label.brand">Brand</span><span id="brand" class="value"></span></div>
      <div class="row reason-row"><span class="label" data-i18n="warning.label.reason">Reason</span><p id="reason" class="value reason"></p></div>
    </section>

    <div class="actions">
      <button id="back" class="primary" data-i18n="warning.btnBack">Go back safely</button>
      <button id="rescan" class="ghost" data-i18n="warning.btnRescan" data-i18n-title="warning.tipRescan">Clear this page's history &amp; re-scan</button>
      <button id="proceed" class="ghost" data-i18n="warning.btnProceed">Allow this site and continue</button>
    </div>

    <p class="footnote" id="footnote">
      This warning is an estimate from Chrome's built-in Gemini Nano on-device analysis.<br>False positives are possible — ask your IT security team if unsure.
    </p>
  </main>
  <script src="i18n.js"></script>
  <script src="warning.js"></script>
</body>
</html>
